name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.6"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Analyze, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Only errors fail the build. The codebase carries pre-existing
      # warnings/infos (lint debt); tighten this once they are cleared.
      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

      # Verifies the release bundle compiles. No signing secrets here, so
      # Gradle falls back to debug signing (see android/app/build.gradle.kts).
      - name: Build app bundle (verify)
        run: flutter build appbundle --release --dart-define-from-file=config/dev.json
