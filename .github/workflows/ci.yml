name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.6"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Analyze, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Speeds up the Android build on repeat runs (first run still warms it).
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      # Only errors fail the build. The codebase carries pre-existing
      # warnings/infos (lint debt); tighten this once they are cleared.
      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

      # A debug APK is enough to catch Gradle/manifest/build breakage and is
      # far faster than a release bundle. The real signed release AAB is built
      # by deploy-play.yml on merge to main.
      - name: Build APK (verify)
        run: flutter build apk --debug --dart-define-from-file=config/dev.json --dart-define-from-file=config/mass_dev.json
