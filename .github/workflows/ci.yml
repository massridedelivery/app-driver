name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.6"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Analyze, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Speeds up the Android build on repeat runs (first run still warms it).
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      # `.env` is gitignored (holds secrets) so it's absent on CI. It's
      # declared as a pubspec asset and loaded at boot, so the asset bundle
      # fails to build without it. An empty file satisfies the bundle; the
      # Directions API key falls back to '' — fine for analyze/test/build.
      - name: Create placeholder .env
        run: touch .env

      # Only errors fail the build. The codebase carries pre-existing
      # warnings/infos (lint debt); tighten this once they are cleared.
      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

      # Build the release app bundle the same way deploy-play.yml does, so a
      # broken release/bundle build (release-mode compile, resource shrinking,
      # manifest merge) is caught at PR time instead of on merge to main. No
      # signing secrets on CI, so build.gradle.kts falls back to debug signing —
      # fine for build verification; deploy-play.yml produces the real signed AAB.
      - name: Build app bundle (verify)
        run: flutter build appbundle --release --dart-define-from-file=config/preprod.json --dart-define-from-file=config/mass_dev.json
