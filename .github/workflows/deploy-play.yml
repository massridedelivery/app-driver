name: Deploy to Play (internal)

# Builds a signed app bundle and ships it to the Play Console "internal"
# testing track. Triggered on every push to main, or manually.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64     base64 of mass-driver-keystore.jks
#                               (`base64 -i mass-driver-keystore.jks | pbcopy`)
#   ANDROID_KEYSTORE_PASSWORD   keystore/key password (same value for PKCS12)
#   ANDROID_KEY_ALIAS           key alias (e.g. mass-drive)
#   PLAY_SERVICE_ACCOUNT_JSON   full JSON of a Play Console service account
#                               with "Release to testing tracks" permission
#
# Note: the very first release for a package must be uploaded through the
# Play Console UI once. After that this workflow can publish updates.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-play
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.41.6"
  JAVA_VERSION: "17"
  PACKAGE_NAME: "com.massapp.massdrive"

jobs:
  deploy:
    name: Build signed bundle & upload
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/android/app/upload-keystore.jks"

      - name: Create key.properties
        run: |
          cat > "${{ github.workspace }}/android/key.properties" <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=${{ github.workspace }}/android/app/upload-keystore.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      # versionCode = run number + offset. The offset clears the versionCode of
      # the first bundle uploaded manually (1), so this never collides. The run
      # number keeps every subsequent upload unique and increasing. Arithmetic
      # is done in the shell because Actions expressions have no "+" operator.
      - name: Build signed app bundle
        run: |
          flutter build appbundle --release \
            --dart-define-from-file=config/preprod.json \
            --dart-define-from-file=config/mass_dev.json \
            --build-number=$((GITHUB_RUN_NUMBER + 10))

      - name: Upload to Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Clean up secrets
        if: always()
        run: rm -f "${{ github.workspace }}/android/key.properties" "${{ github.workspace }}/android/app/upload-keystore.jks"
